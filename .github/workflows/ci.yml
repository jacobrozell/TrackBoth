name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  CI_XCODE_PROJECT: TrackBoth/TrackBoth.xcodeproj
  CI_XCODE_SCHEME: TrackBothCI
  SIM_DESTINATION: platform=iOS Simulator,name=iPhone 17

jobs:
  build:
    name: Build
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: latest-stable

      - name: Install CI tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        working-directory: TrackBoth
        run: xcodegen generate

      - name: Build app and test targets
        working-directory: TrackBoth
        run: |
          set -eo pipefail
          xcodebuild build \
            -project TrackBoth.xcodeproj \
            -scheme "$CI_XCODE_SCHEME" \
            -destination "$SIM_DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Run unit tests with coverage
        working-directory: TrackBoth
        run: |
          set -eo pipefail
          RESULT_BUNDLE="$RUNNER_TEMP/TrackBothTestResults.xcresult"
          rm -rf "$RESULT_BUNDLE"
          xcodebuild test \
            -project TrackBoth.xcodeproj \
            -scheme TrackBoth \
            -destination "$SIM_DESTINATION" \
            -only-testing:TrackBothTests \
            -enableCodeCoverage YES \
            -resultBundlePath "$RESULT_BUNDLE" \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Check coverage gate
        run: |
          chmod +x Scripts/check-coverage.sh
          Scripts/check-coverage.sh "$RUNNER_TEMP/TrackBothTestResults.xcresult" 50
