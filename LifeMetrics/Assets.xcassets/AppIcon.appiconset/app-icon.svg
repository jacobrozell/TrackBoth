<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGradient)"/>
  
  <!-- Chart container -->
  <rect x="150" y="200" width="724" height="500" rx="20" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- Chart grid lines -->
  <line x1="200" y1="300" x2="800" y2="300" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="200" y1="400" x2="800" y2="400" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="200" y1="500" x2="800" y2="500" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="200" y1="600" x2="800" y2="600" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- Chart line -->
  <path d="M 200 650 Q 300 500 400 450 T 600 350 T 800 300" 
        stroke="url(#chartGradient)" 
        stroke-width="8" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Data points -->
  <circle cx="200" cy="650" r="8" fill="#4facfe"/>
  <circle cx="300" cy="500" r="8" fill="#4facfe"/>
  <circle cx="400" cy="450" r="8" fill="#4facfe"/>
  <circle cx="500" cy="400" r="8" fill="#4facfe"/>
  <circle cx="600" cy="350" r="8" fill="#4facfe"/>
  <circle cx="700" cy="320" r="8" fill="#4facfe"/>
  <circle cx="800" cy="300" r="8" fill="#4facfe"/>
  
  <!-- Bar chart elements -->
  <rect x="250" y="550" width="40" height="100" fill="rgba(255,255,255,0.6)" rx="4"/>
  <rect x="350" y="500" width="40" height="150" fill="rgba(255,255,255,0.6)" rx="4"/>
  <rect x="450" y="450" width="40" height="200" fill="rgba(255,255,255,0.6)" rx="4"/>
  <rect x="550" y="400" width="40" height="250" fill="rgba(255,255,255,0.6)" rx="4"/>
  <rect x="650" y="350" width="40" height="300" fill="rgba(255,255,255,0.6)" rx="4"/>
  
  <!-- App name text -->
  <text x="512" y="800" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">QuickLog</text>
  
  <!-- Small metric indicators -->
  <circle cx="300" cy="150" r="15" fill="rgba(255,255,255,0.8)"/>
  <text x="300" y="158" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#667eea">📊</text>
  
  <circle cx="724" cy="150" r="15" fill="rgba(255,255,255,0.8)"/>
  <text x="724" y="158" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#667eea">📈</text>
</svg>
