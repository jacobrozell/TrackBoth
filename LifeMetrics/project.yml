name: TrackBoth
attributes:
  ORGANIZATIONNAME: Jacob Rozell
options:
  minimumXcodeGenVersion: 2.44.0
  bundleIdPrefix: com.jacobrozell
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 7JT2JB89AV
    CODE_SIGN_STYLE: Automatic
targets:
  TrackBoth:
    type: application
    platform: iOS
    sources:
      - path: TrackBothApp.swift
      - path: Assets.xcassets
      - path: Tabs
      - path: Components
      - path: Domain
      - path: Support
      - path: Models
      - path: Utils
      - path: ViewModels
      - path: Views
      - path: WidgetShared
      - path: TrackBoth-Info.plist
        type: file
        buildPhase: none
    dependencies:
      - target: TrackBoth-WidgetExtension
        embed: true
    entitlements:
      path: TrackBoth.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.TrackBoth
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 3
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: TrackBoth-Info.plist
        CODE_SIGN_ENTITLEMENTS: TrackBoth.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: TrackBoth
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.healthcare-fitness
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  TrackBoth-WidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: WidgetShared
      - path: TrackBoth-Widget
        excludes:
          - Info.plist
          - TrackBoth-Widget.entitlements
      - path: TrackBoth-Widget/Info.plist
        type: file
        buildPhase: none
    entitlements:
      path: TrackBoth-Widget/TrackBoth-Widget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.TrackBoth.TrackBoth-Widget
        CODE_SIGN_ENTITLEMENTS: TrackBoth-Widget/TrackBoth-Widget.entitlements
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 3
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TrackBoth-Widget/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: TrackBoth-Widget
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
  TrackBothTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/Unit
    dependencies:
      - target: TrackBoth
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.TrackBothTests
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
  TrackBothUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UI
    dependencies:
      - target: TrackBoth
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: TrackBoth
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.TrackBothUITests
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
schemes:
  TrackBoth:
    build:
      targets:
        TrackBoth: all
    test:
      targets:
        - TrackBothTests
        - TrackBothUITests
    run:
      config: Debug
    archive:
      config: Release
  TrackBothCI:
    build:
      targets:
        TrackBoth: all
        TrackBothTests: all
        TrackBothUITests: all
    run:
      config: Debug
  TrackBothWidget:
    build:
      targets:
        TrackBoth: all
        TrackBoth-WidgetExtension: all
    run:
      config: Debug
